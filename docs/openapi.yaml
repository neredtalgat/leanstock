openapi: 3.0.0
info:
  title: LeanStock API
  description: Enterprise Inventory Management System for Multi-Tenant SaaS
  version: 1.0.0
  contact:
    name: LeanStock Team
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.leanstock.com
    description: Production server

tags:
  - name: Authentication
    description: User registration, login, and token management
  - name: Products
    description: Product catalog management
  - name: Inventory
    description: Inventory tracking and movements
  - name: Transfers
    description: Inter-location stock transfers
  - name: Health
    description: Service health check

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum:
            - SUPER_ADMIN
            - TENANT_ADMIN
            - REGIONAL_MANAGER
            - STORE_MANAGER
            - STORE_ASSOCIATE
            - SUPPLIER
        tenantId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        lastLogin:
          type: string
          format: date-time
          nullable: true

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        sku:
          type: string
        barcode:
          type: string
          nullable: true
        category:
          type: string
        retailPrice:
          type: number
        costPrice:
          type: number
        unit:
          type: string
        reorderPoint:
          type: integer
        status:
          type: string
          enum: [ACTIVE, DISCONTINUED, ARCHIVED]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TransferOrder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        status:
          type: string
          enum:
            - DRAFT
            - PENDING_APPROVAL
            - APPROVED
            - IN_TRANSIT
            - PARTIALLY_RECEIVED
            - COMPLETED
            - CANCELLED
        sourceLocationId:
          type: string
          format: uuid
        destinationLocationId:
          type: string
          format: uuid
        totalValue:
          type: number
        requiresApproval:
          type: boolean
        carrier:
          type: string
          nullable: true
        trackingNumber:
          type: string
          nullable: true
        shippedAt:
          type: string
          format: date-time
          nullable: true
        receivedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          format: uuid
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              productId:
                type: string
                format: uuid
              quantityShipped:
                type: integer
              quantityReceived:
                type: integer
              price:
                type: number

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: string
          nullable: true
        statusCode:
          type: integer

    Success:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        message:
          type: string

paths:
  /health:
    get:
      tags:
        - Health
      summary: Service health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - firstName
                - lastName
                - tenantId
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  description: Must contain uppercase, lowercase, and number
                firstName:
                  type: string
                lastName:
                  type: string
                role:
                  type: string
                  enum:
                    - TENANT_ADMIN
                    - REGIONAL_MANAGER
                    - STORE_MANAGER
                    - STORE_ASSOCIATE
                    - SUPPLIER
                tenantId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already exists

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '401':
          description: Invalid credentials
        '429':
          description: Too many login attempts

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '401':
          description: Invalid or expired refresh token

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      operationId: logoutUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout successful

  /products:
    post:
      tags:
        - Products
      summary: Create a new product
      operationId: createProduct
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - sku
                - category
                - retailPrice
                - costPrice
              properties:
                name:
                  type: string
                sku:
                  type: string
                barcode:
                  type: string
                category:
                  type: string
                retailPrice:
                  type: number
                costPrice:
                  type: number
                unit:
                  type: string
                reorderPoint:
                  type: integer
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '401':
          description: Unauthorized

    get:
      tags:
        - Products
      summary: List products
      operationId: listProducts
      security:
        - BearerAuth: []
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Products list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '401':
          description: Unauthorized

  /products/{id}:
    get:
      tags:
        - Products
      summary: Get product by ID
      operationId: getProduct
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '404':
          description: Product not found

    patch:
      tags:
        - Products
      summary: Update product
      operationId: updateProduct
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                retailPrice:
                  type: number
                costPrice:
                  type: number
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

    delete:
      tags:
        - Products
      summary: Delete product
      operationId: deleteProduct
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Product deleted

  /inventory:
    get:
      tags:
        - Inventory
      summary: Get inventory for product and location
      operationId: getInventory
      security:
        - BearerAuth: []
      parameters:
        - name: productId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: locationId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Inventory details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /inventory/movements:
    post:
      tags:
        - Inventory
      summary: Record inventory movement
      operationId: recordMovement
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
                - locationId
                - type
                - quantity
              properties:
                productId:
                  type: string
                  format: uuid
                locationId:
                  type: string
                  format: uuid
                type:
                  type: string
                  enum: [IN, OUT, ADJUSTMENT, RETURN]
                quantity:
                  type: integer
                reason:
                  type: string
      responses:
        '201':
          description: Movement recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /inventory/low-stock:
    get:
      tags:
        - Inventory
      summary: Get low stock items
      operationId: getLowStockItems
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Low stock items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /transfers:
    post:
      tags:
        - Transfers
      summary: Create a new transfer
      operationId: createTransfer
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sourceLocationId
                - destinationLocationId
                - items
              properties:
                sourceLocationId:
                  type: string
                  format: uuid
                destinationLocationId:
                  type: string
                  format: uuid
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      productId:
                        type: string
                        format: uuid
                      quantity:
                        type: integer
                notes:
                  type: string
      responses:
        '201':
          description: Transfer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '401':
          description: Unauthorized
        '409':
          description: Insufficient inventory

    get:
      tags:
        - Transfers
      summary: List transfers
      operationId: listTransfers
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Transfers list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /transfers/{id}:
    get:
      tags:
        - Transfers
      summary: Get transfer by ID
      operationId: getTransfer
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transfer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /transfers/{id}/approve:
    post:
      tags:
        - Transfers
      summary: Approve or reject transfer
      operationId: approveTransfer
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - approved
              properties:
                approved:
                  type: boolean
                reason:
                  type: string
      responses:
        '200':
          description: Transfer updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /transfers/{id}/ship:
    post:
      tags:
        - Transfers
      summary: Mark transfer as shipped
      operationId: shipTransfer
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - carrier
                - trackingNumber
              properties:
                carrier:
                  type: string
                trackingNumber:
                  type: string
      responses:
        '200':
          description: Transfer shipped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /transfers/{id}/receive:
    post:
      tags:
        - Transfers
      summary: Receive transferred items
      operationId: receiveTransfer
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      transferItemId:
                        type: string
                        format: uuid
                      quantityReceived:
                        type: integer
      responses:
        '200':
          description: Items received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
