<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeanStock — Inventory Management</title>
<style>
:root{--sidebar:#0f172a;--sidebar-hover:#1e293b;--accent:#3b82f6;--accent-hover:#2563eb;--bg:#f1f5f9;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--danger:#ef4444;--danger-hover:#dc2626;--success:#22c55e;--success-bg:#dcfce7;--success-text:#166534;--warning:#f59e0b;--warning-bg:#fef3c7;--warning-text:#92400e;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;background:none;font-size:14px}

/* Sidebar */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--sidebar);color:#94a3b8;display:flex;flex-direction:column;z-index:100}
.sidebar-brand{padding:20px 24px;font-size:18px;font-weight:700;color:#fff;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-brand span{color:var(--accent)}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0}
.sidebar-nav a{display:flex;align-items:center;gap:12px;padding:10px 20px;margin:2px 12px;border-radius:8px;font-size:14px;transition:.15s;cursor:pointer}
.sidebar-nav a:hover,.sidebar-nav a.active{background:var(--sidebar-hover);color:#fff}
.sidebar-nav a svg{flex-shrink:0;width:18px;height:18px}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:13px}
.sidebar-footer .user-name{color:#fff;font-weight:600}
.sidebar-footer .user-role{text-transform:capitalize;color:#64748b}

/* Main */
.main{margin-left:240px;min-height:100vh}
.topbar{height:64px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50}
.topbar h1{font-size:18px;font-weight:600}
.topbar-actions{display:flex;gap:10px;align-items:center}

/* Content */
.content{padding:24px 28px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}

/* Cards */
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:20px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-title{font-size:16px;font-weight:600}
.stat-value{font-size:28px;font-weight:700;color:var(--text)}
.stat-label{font-size:13px;color:var(--muted);margin-top:4px}
.stat-change{font-size:12px;margin-top:8px;padding:4px 8px;border-radius:20px;display:inline-block}
.stat-change.up{background:var(--success-bg);color:var(--success-text)}
.stat-change.down{background:#fee2e2;color:#991b1b}

/* Table */
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:12px 16px;color:var(--muted);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border)}
td{padding:14px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:#f8fafc}
.badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.badge-green{background:#dcfce7;color:#166534}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-yellow{background:#fef9c3;color:#854d0e}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-gray{background:#f1f5f9;color:#475569}

/* Buttons */
.btn{padding:8px 16px;border-radius:8px;font-weight:500;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:var(--danger-hover)}
.btn-outline{border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:#f8fafc}
.btn-sm{padding:6px 12px;font-size:13px}

/* Forms */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px}
input,select,textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;transition:.15s;background:var(--card)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow:auto;box-shadow:0 25px 50px -12px rgba(0,0,0,.25)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

/* Toast */
.toast{position:fixed;top:20px;right:20px;padding:14px 20px;border-radius:10px;color:#fff;font-weight:600;z-index:300;animation:slideIn .3s ease;max-width:400px}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Auth */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%)}
.auth-card{background:var(--card);border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 25px 50px -12px rgba(0,0,0,.35)}
.auth-card h2{font-size:24px;margin-bottom:8px}
.auth-card p{color:var(--muted);margin-bottom:24px;font-size:14px}
.auth-link{color:var(--accent);font-weight:500;cursor:pointer}
.auth-link:hover{text-decoration:underline}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty h3{font-size:18px;color:var(--text);margin-bottom:8px}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:10px 16px;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--accent);border-color:var(--accent)}

/* Responsive */
@media(max-width:1024px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.sidebar{width:100%;position:relative}.main{margin-left:0}.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}

.hidden{display:none!important}
</style>
</head>
<body>
<div id="app"></div>
<script>
const DIRECT_API_BASE = 'http://localhost:3000';
let API = (() => {
  // Prefer nginx proxy when frontend runs in container on :3001.
  if (window.location.port === '3001') return '/api';
  // file:// origin becomes "null" and is blocked by CORS in secure setups.
  // Keep direct API fallback, but show explicit guidance on connection errors.
  if (window.location.protocol === 'file:') return DIRECT_API_BASE;
  return `${window.location.protocol}//${window.location.hostname}:3000`;
})();
let token = localStorage.getItem('accessToken') || '';
let refresh = localStorage.getItem('refreshToken') || '';
let user = JSON.parse(localStorage.getItem('user') || 'null');
let currentPage = 'dashboard';
let authTab = 'login';

function $(id){return document.getElementById(id)}
function toast(msg, type='success'){
  const d=document.createElement('div');
  d.className='toast';
  d.style.background = type==='success'?'#16a34a':type==='error'?'#dc2626':'#3b82f6';
  d.textContent=msg; document.body.appendChild(d);
  setTimeout(()=>d.remove(),5000);
}

async function api(path, opts={}){
  const buildUrl = (base) => `${base}${path}`;
  const headers = {'Content-Type':'application/json', ...(opts.headers||{})};
  if(token) headers['Authorization'] = 'Bearer ' + token;

  let res;
  try{
    res = await fetch(buildUrl(API), {...opts, headers});
  }catch(err){
    // If /api proxy is unavailable (e.g. running frontend via npx serve), fallback to direct backend URL.
    if(API === '/api'){
      API = DIRECT_API_BASE;
      res = await fetch(buildUrl(API), {...opts, headers});
    }else{
      throw err;
    }
  }

  if(res.status===404 && API === '/api'){
    API = DIRECT_API_BASE;
    res = await fetch(buildUrl(API), {...opts, headers});
  }

  if(res.status===401 && refresh){
    const r = await fetch(`${API}/auth/refresh`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken:refresh})});
    if(r.ok){
      const d=await r.json();
      token=d.accessToken;
      localStorage.setItem('accessToken',token);
      headers['Authorization']='Bearer '+token;
      const r2=await fetch(buildUrl(API),{...opts,headers});
      return r2;
    } else{ logout(); }
  }
  return res;
}

function logout(){ localStorage.clear(); token=''; user=null; currentPage='dashboard'; renderAuth(); toast('Logged out','info'); }

// ============ AUTH ============
function renderAuth(){
  const params = new URLSearchParams(window.location.search);
  const verifyStatus = params.get('verify');
  const verifyMsg = params.get('message');
  const inviteToken = params.get('token');
  const isInvitePath = window.location.pathname.includes('/accept-invitation');
  if (inviteToken || isInvitePath) authTab = 'invite';
  if(verifyStatus) window.history.replaceState({}, document.title, window.location.pathname);

  $('app').innerHTML = `
    <div class="auth-page">
      <div class="auth-card">
        <h2>LeanStock</h2>
        <p>Inventory Management System</p>
        ${verifyStatus==='success'?'<div style="background:#dcfce7;color:#166534;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px">'+decodeURIComponent(verifyMsg||'Email verified!')+'</div>':''}
        ${verifyStatus==='error'?'<div style="background:#fee2e2;color:#991b1b;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px">'+decodeURIComponent(verifyMsg||'Verification failed')+'</div>':''}
        <div class="tabs" style="margin-bottom:16px">
          <div class="tab ${authTab==='login'?'active':''}" onclick="switchAuthTab('login')">Sign In</div>
          <div class="tab ${authTab==='invite'?'active':''}" onclick="switchAuthTab('invite')">Accept Invite</div>
        </div>
        <div id="auth-login" class="${authTab==='login'?'':'hidden'}">
          <div class="form-group"><label>Email</label><input id="li-email" type="email" placeholder="you@company.com"></div>
          <div class="form-group"><label>Password</label><input id="li-pass" type="password" placeholder="••••••••"></div>
          <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" onclick="login()">Sign In</button>
          <p style="text-align:center;margin-top:16px;font-size:14px"><span class="auth-link" onclick="showForgot()">Forgot password?</span></p>
        </div>
        <div id="auth-invite" class="${authTab==='invite'?'':'hidden'}">
          <div class="form-group"><label>Invitation Token</label><input id="inv-token" placeholder="Paste token from email" value="${inviteToken?decodeURIComponent(inviteToken):''}"></div>
          <div class="form-row">
            <div class="form-group"><label>First Name</label><input id="inv-fname" placeholder="John"></div>
            <div class="form-group"><label>Last Name</label><input id="inv-lname" placeholder="Doe"></div>
          </div>
          <div class="form-group"><label>Password</label><input id="inv-pass" type="password" placeholder="At least 8 chars, with upper/lower/number"></div>
          <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" onclick="acceptInvitation()">Create Account</button>
          <p style="margin-top:12px;color:var(--muted);font-size:13px">Token sent to your email by your admin. It expires in 7 days.</p>
        </div>
      </div>
    </div>`;
}

function switchAuthTab(tab){
  authTab = tab;
  renderAuth();
}

async function login(){
  try{
    const res = await api('/auth/login',{method:'POST',body:JSON.stringify({email:$('li-email').value,password:$('li-pass').value})});
    const data = await res.json().catch(()=>({}));
    if(!res.ok){
      let msg = data.message || 'Login failed';
      if(data.code==='EMAIL_NOT_VERIFIED' && data.emailSent){
        msg = 'Please verify your email first. A new verification link has been sent to your inbox (check Spam too).';
      }
      toast(msg,'error'); return;
    }
    token=data.accessToken; refresh=data.refreshToken; user=data.user;
    localStorage.setItem('accessToken',token); localStorage.setItem('refreshToken',refresh); localStorage.setItem('user',JSON.stringify(user));
    toast('Welcome, '+(user.firstName||user.email)); renderApp();
  }catch(_e){
    if (window.location.protocol === 'file:') {
      toast('Frontend is opened via file://. Start UI on http://localhost:3001 and try again.','error');
      return;
    }
    toast(`Cannot connect to API (${API}). Check backend on http://localhost:3000`,'error');
  }
}

async function acceptInvitation(){
  const payload = {
    token: $('inv-token').value.trim(),
    firstName: $('inv-fname').value.trim() || undefined,
    lastName: $('inv-lname').value.trim() || undefined,
    password: $('inv-pass').value,
  };

  if(!payload.token){ toast('Invitation token is required','error'); return; }
  if(!payload.password){ toast('Password is required','error'); return; }

  const res = await api('/auth/register-invite',{method:'POST',body:JSON.stringify(payload)});
  const data = await res.json();
  if(!res.ok){ toast(data.message || 'Failed to accept invitation','error'); return; }

  token = data.accessToken;
  refresh = data.refreshToken;
  user = {
    id: data.id,
    email: data.email,
    firstName: data.firstName,
    lastName: data.lastName,
    role: data.role,
  };
  localStorage.setItem('accessToken', token);
  localStorage.setItem('refreshToken', refresh);
  localStorage.setItem('user', JSON.stringify(user));

  if(window.location.pathname.includes('/accept-invitation') || window.location.search.includes('token=')){
    window.history.replaceState({}, document.title, '/');
  }
  toast('Invitation accepted. Welcome to LeanStock!');
  renderApp();
}

async function showForgot(){
  const email = prompt('Enter your email:'); if(!email) return;
  const res = await api('/auth/forgot-password',{method:'POST',body:JSON.stringify({email})});
  toast(res.ok?'Reset link sent to your email':'Failed to send reset link', res.ok?'success':'error');
}

// ============ APP SHELL ============
function renderApp(){
  if(!user){ renderAuth(); return; }
  const isSuper = user.role==='SUPER_ADMIN';
  const isAdmin = user.role==='TENANT_ADMIN' || isSuper;
  const navItems = [
    {id:'dashboard',label:'Dashboard',icon:'M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z'},
    {id:'products',label:'Products',icon:'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4'},
    {id:'inventory',label:'Inventory',icon:'M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4'},
    {id:'transfers',label:'Transfers',icon:'M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4'},
    {id:'purchase-orders',label:'Purchase Orders',icon:'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2'},
    {id:'suppliers',label:'Suppliers',icon:'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z'},
    {id:'locations',label:'Locations',icon:'M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0zM15 11a3 3 0 11-6 0 3 3 0 016 0z'},
    ...(isAdmin?[{id:'users',label:'Team',icon:'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z'}]:[]),
    {id:'analytics',label:'Analytics',icon:'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z'},
  ];

  $('app').innerHTML = `
    <div class="sidebar">
      <div class="sidebar-brand">Lean<span>Stock</span></div>
      <nav class="sidebar-nav">
        ${navItems.map(item=>`<a class="${currentPage===item.id?'active':''}" onclick="navigate('${item.id}')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="${item.icon}"/></svg>
          ${item.label}
        </a>`).join('')}
      </nav>
      <div class="sidebar-footer">
        <div class="user-name">${user.firstName||user.email}</div>
        <div class="user-role">${user.role?.replace(/_/g,' ').toLowerCase()}</div>
        <button class="btn btn-outline" style="margin-top:12px;width:100%;color:#94a3b8;border-color:rgba(255,255,255,.15)" onclick="logout()">Sign Out</button>
      </div>
    </div>
    <div class="main" id="main"></div>`;

  renderPage(currentPage);
}

function navigate(page){ currentPage=page; renderApp(); }

function renderPage(page){
  const main = $('main');
  switch(page){
    case 'dashboard': renderDashboard(main); break;
    case 'products': renderProducts(main); break;
    case 'inventory': renderInventory(main); break;
    case 'transfers': renderTransfers(main); break;
    case 'purchase-orders': renderPurchaseOrders(main); break;
    case 'suppliers': renderSuppliers(main); break;
    case 'locations': renderLocations(main); break;
    case 'users': renderUsers(main); break;
    case 'analytics': renderAnalytics(main); break;
    default: renderDashboard(main);
  }
}

// ============ PAGES ============
async function renderDashboard(el){
  el.innerHTML = '<div class="content"><div class="grid-4" id="dash-stats">Loading...</div></div>';
  try{
    const [prodRes,invRes,transRes,poRes] = await Promise.all([
      api('/products?limit=1'), api('/inventory?limit=1'), api('/transfers?limit=1'), api('/purchase-orders?limit=1')
    ]);
    const prod = prodRes.ok?await prodRes.json():{};
    const inv = invRes.ok?await invRes.json():{};
    const trans = transRes.ok?await transRes.json():{};
    const po = poRes.ok?await poRes.json():{};
    $('dash-stats').innerHTML = [
      {label:'Products',value:prod.pagination?.totalCount||0,change:'+12%',up:true},
      {label:'Inventory Items',value:inv.pagination?.totalCount||0,change:'+5%',up:true},
      {label:'Transfers',value:trans.pagination?.totalCount||0,change:'-2%',up:false},
      {label:'Purchase Orders',value:po.pagination?.totalCount||0,change:'+8%',up:true},
    ].map(s=>`<div class="card"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div><span class="stat-change ${s.up?'up':'down'}">${s.up?'↑':'↓'} ${s.change}</span></div>`).join('');
  }catch(e){ toast('Failed to load dashboard','error'); }
}

async function renderProducts(el){
  el.innerHTML = `<div class="content">
    <div class="topbar"><h1>Products</h1><div class="topbar-actions">${user.role!=='STORE_ASSOCIATE'?'<button class="btn btn-primary" onclick="openProductModal()">+ New Product</button>':''}</div></div>
    <div class="card"><table><thead><tr><th>SKU</th><th>Name</th><th>Description</th><th>Cost</th><th>Price</th></tr></thead><tbody id="prod-tbody"><tr><td colspan="5" style="text-align:center;color:var(--muted)">Loading...</td></tr></tbody></table></div>
  </div>`;
  const res = await api('/products?limit=50');
  const data = await res.json();
  const items = data.data || data.items || [];
  $('prod-tbody').innerHTML = items.length?items.map(p=>`<tr><td><span class="badge badge-blue">${p.sku}</span></td><td><strong>${p.name}</strong></td><td>${p.description||'—'}</td><td>$${p.baseCost}</td><td>$${p.retailPrice}</td></tr>`).join(''):'<tr><td colspan="5" class="empty">No products found</td></tr>';
}
function openProductModal(){
  const modal = document.createElement('div');
  modal.className='modal-overlay'; modal.id='product-modal';
  modal.innerHTML = `<div class="modal">
    <div class="modal-header"><h3>New Product</h3><button class="btn" onclick="closeModal('product-modal')" style="font-size:20px">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>SKU</label><input id="p-sku" placeholder="SKU-001"></div>
      <div class="form-group"><label>Name</label><input id="p-name" placeholder="Product name"></div>
      <div class="form-group"><label>Description</label><textarea id="p-desc" placeholder="Optional"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Base Cost</label><input id="p-cost" type="number" min="0.01" step="0.01" placeholder="10.00"></div>
        <div class="form-group"><label>Retail Price</label><input id="p-price" type="number" min="0.01" step="0.01" placeholder="15.99"></div>
      </div>
      <div class="form-group"><label>Weight (optional)</label><input id="p-weight" type="number" min="0.01" step="0.01" placeholder="1.25"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('product-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="createProduct()">Create Product</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
}

async function createProduct(){
  const body = {
    sku: $('p-sku').value.trim(),
    name: $('p-name').value.trim(),
    description: $('p-desc').value.trim() || undefined,
    baseCost: Number($('p-cost').value),

async function openTransferModal(){
  const [locationsRes, productsRes] = await Promise.all([
    api('/locations?limit=200'),
    api('/products?limit=200'),
  ]);
  const locationsRaw = await locationsRes.json().catch(()=>[]);
  const productsRaw = await productsRes.json().catch(()=>({}));
  const locations = Array.isArray(locationsRaw) ? locationsRaw : (locationsRaw.data || locationsRaw.items || []);
  const products = productsRaw.data || productsRaw.items || [];

  if(!locations.length){ toast('Create locations first','error'); return; }
  if(!products.length){ toast('Create products first','error'); return; }

  const modal = document.createElement('div');
  modal.className='modal-overlay'; modal.id='transfer-modal';
  modal.innerHTML = `<div class="modal">
    <div class="modal-header"><h3>New Transfer</h3><button class="btn" onclick="closeModal('transfer-modal')" style="font-size:20px">&times;</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>From Location</label><select id="tr-from">${locations.map(l=>`<option value="${l.id}">${l.name}</option>`).join('')}</select></div>
        <div class="form-group"><label>To Location</label><select id="tr-to">${locations.map(l=>`<option value="${l.id}">${l.name}</option>`).join('')}</select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Product</label><select id="tr-product">${products.map(p=>`<option value="${p.id}">${p.sku} — ${p.name}</option>`).join('')}</select></div>
        <div class="form-group"><label>Quantity</label><input id="tr-qty" type="number" min="1" step="1" value="1"></div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="tr-notes" placeholder="Optional"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('transfer-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="createTransfer()">Create Transfer</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
}

async function createTransfer(){
  const fromLocationId = $('tr-from').value;
  const toLocationId = $('tr-to').value;
  const quantity = Number($('tr-qty').value);

  if(!fromLocationId || !toLocationId){ toast('Locations are required', 'error'); return; }
  if(fromLocationId === toLocationId){ toast('From/To locations must be different', 'error'); return; }
  if(!Number.isInteger(quantity) || quantity <= 0){ toast('Quantity must be a positive integer', 'error'); return; }

  const body = {
    fromLocationId,
    toLocationId,
    items: [{ productId: $('tr-product').value, quantity }],
    notes: $('tr-notes').value.trim() || undefined,
  };

  const res = await api('/transfers', {
    method:'POST',
    headers: { 'Idempotency-Key': crypto.randomUUID() },
    body: JSON.stringify(body),
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok){ toast(data.message || 'Failed to create transfer', 'error'); return; }
  toast('Transfer created');
  closeModal('transfer-modal');
  renderPage('transfers');
}

async function loadUsers(){

    const status = u.isActive?'<span class="badge badge-green">Active</span>':'<span class="badge badge-red">Inactive</span>';
    return `<tr><td><strong>${u.firstName||''} ${u.lastName||''}</strong></td><td>${u.email}</td><td><span class="badge badge-blue">${u.role?.replace(/_/g,' ')}</span></td><td>${status}</td><td>${new Date(u.createdAt).toLocaleDateString()}</td></tr>`;
  }).join(''):'<tr><td colspan="5" class="empty">No team members found</td></tr>';
}

  const modal = document.createElement('div');

async function createUser(){

function openInviteAcceptancePage(){
  const value = $('team-invite-token')?.value?.trim();

  const url = `/accept-invitation?token=${encodeURIComponent(value)}`;
  window.open(url, '_blank', 'noopener');
}

function closeModal(id){ const m=$(id); if(m) m.remove(); }

async function loadForecast(){
  const id=$('fc-prod').value; if(!id) return;
  const res=await api('/analytics/forecast/'+id+'?days=30');
  const d=await res.json();
  if(!res.ok){ toast(d.message||'Failed','error'); return; }
  $('fc-result').style.display='block'; $('fc-result').textContent=JSON.stringify(d,null,2);
}
