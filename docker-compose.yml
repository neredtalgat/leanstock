version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: leanstock-postgres
    environment:
      POSTGRES_USER: leanstock
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: leanstock
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leanstock"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leanstock-network

  redis:
    image: redis:7-alpine
    container_name: leanstock-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leanstock-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leanstock-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://leanstock:${DB_PASSWORD:-password}@postgres:5432/leanstock
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_min_32_characters_required_here}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leanstock-network
    volumes:
      - ./src:/app/src

volumes:
  postgres_data:

networks:
  leanstock-network:
    driver: bridge
