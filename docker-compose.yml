version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: leanstock-postgres
    environment:
      POSTGRES_USER: leanstock
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: leanstock
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    container_name: leanstock-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: leanstock-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://leanstock:${DB_PASSWORD:-password}@postgres:5432/leanstock
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-secret-key-min-32-chars}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
      LOG_LEVEL: info
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: leanstock-network
