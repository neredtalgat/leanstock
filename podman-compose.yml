version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: leanstock-postgres
    environment:
      POSTGRES_USER: leanstock
      POSTGRES_PASSWORD: password
      POSTGRES_DB: leanstock
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U leanstock']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: leanstock-redis
    # Не пробрасываем порт наружу
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leanstock-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DISABLE_RATE_LIMIT: "true"
      DATABASE_URL: postgresql://leanstock:password@postgres:5433/leanstock
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-secret-key-min-32-chars}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
      LOG_LEVEL: info
      SEED_DATABASE: "true"  # Установите "false" чтобы пропустить сидирование
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: leanstock-network
